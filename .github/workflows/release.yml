name: Release

# Publish a GitHub Release with the packaged extension whenever a v* tag is pushed.
# Typical flow: `npm version patch` (bumps version, syncs manifest, commits, tags,
# and pushes via the postversion hook) -> this workflow builds and publishes.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension package
        run: npm run package
        env:
          ZIP_PATH: ${{ github.workspace }}/request-mock-lite.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Request Mock Lite ${{ github.ref_name }}
          files: request-mock-lite.zip
          generate_release_notes: true
